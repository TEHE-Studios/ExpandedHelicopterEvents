name: EHE QA

on:
  push:
    branches: [main, dev]
    paths:
      - "Contents/mods/**/*.lua"
      - "Contents/mods/**/*.txt"
      - "Contents/mods/**/*.xml"
      - "tools/generate.py"
      - "tools/validate.py"
      - "tools/simulate.py"
  pull_request:
    paths:
      - "Contents/mods/**/*.lua"
      - "Contents/mods/**/*.txt"
      - "Contents/mods/**/*.xml"
      - "tools/generate.py"
      - "tools/validate.py"
      - "tools/simulate.py"

jobs:
  qa:
    name: Validate & Generate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Validate ────────────────────────────────────────────────────
      - name: Validate preset files
        run: cd tools && python validate.py

      # ── Generate ────────────────────────────────────────────────────
      # Runs even if validate failed so we always get an artifact to inspect.
      - name: Generate timeline.html
        if: always()
        run: cd tools && python generate.py

      # ── Artifact ────────────────────────────────────────────────────
      - name: Upload timeline artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: timeline-${{ github.sha }}
          path: tools/timeline.html
          retention-days: 30

      # ── Auto-commit on main ─────────────────────────────────────────
      # Regenerates timeline.html on direct pushes to main, never on PRs.
      - name: Commit generated timeline
        if: >
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/timeline.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: regenerate timeline.html [skip ci]"
            git push
          fi
